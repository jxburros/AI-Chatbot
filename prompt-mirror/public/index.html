<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Prompt Mirror</title><style>body{margin:0;background:#17151d;color:#f7f2ff;font:16px/1.5 system-ui,sans-serif}.wrap{max-width:720px;margin:auto;padding:52px 20px}.eyebrow{color:#cbb7ff;text-transform:uppercase;letter-spacing:.14em;font-size:.75rem}h1{font-size:clamp(2.5rem,9vw,5rem);line-height:.9;margin:.4rem 0 1rem}p{color:#c9c4d1}textarea{width:100%;min-height:160px;box-sizing:border-box;border:1px solid #61557a;border-radius:18px;background:#25212e;color:inherit;padding:18px;font:inherit}button{margin-top:14px;border:0;border-radius:999px;padding:13px 20px;background:#d8c1ff;color:#21192d;font-weight:700;cursor:pointer}.cards{display:grid;gap:12px;margin-top:28px}.card{background:#24202c;border:1px solid #3f374e;border-radius:16px;padding:18px}.card h2{font-size:.85rem;text-transform:uppercase;letter-spacing:.1em;color:#cbb7ff;margin:0 0 7px}.hidden{display:none}.error{color:#ffb9bd}</style></head><body><main class="wrap"><div class="eyebrow">a gentle thinking partner</div><h1>Prompt<br>Mirror</h1><p>Put down the thought exactly as it is. Get a reflection, a softer frame, and one small place to begin.</p><textarea id="note" placeholder="I keep thinking..."></textarea><br><button id="go">Reflect it back</button><p class="error hidden" id="error"></p><section class="cards hidden" id="cards"></section></main><script>const $=id=>document.getElementById(id);$('go').onclick=async()=>{const note=$('note').value.trim(),e=$('error'),cards=$('cards');e.classList.add('hidden');if(!note){e.textContent='Write one honest sentence first.';e.classList.remove('hidden');return}$('go').disabled=true;$('go').textContent='Listening…';try{const r=await fetch('/api/mirror',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({note})}),d=await r.json();if(!r.ok)throw Error(d.error);cards.innerHTML=[['Reflection',d.reflection],['A different frame',d.reframe],['One tiny step',d.tinyStep],['Carry this question',d.question]].map(([h,t])=>`<article class="card"><h2>${h}</h2><div>${t}</div></article>`).join('');cards.classList.remove('hidden')}catch(x){e.textContent=x.message;e.classList.remove('hidden')}finally{$('go').disabled=false;$('go').textContent='Reflect it back'}};</script></body></html>
